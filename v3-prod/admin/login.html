<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CAT CrashCourse</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-900: #0f2356; --blue-800: #1a3a6e; --blue-700: #1e4d9b;
      --blue-600: #2563eb; --blue-500: #3b82f6; --blue-400: #60a5fa;
      --blue-100: #dbeafe; --blue-50: #eff6ff;
      --white: #fff; --gray-50: #f8fafc; --gray-100: #f1f5f9;
      --gray-200: #e2e8f0; --gray-300: #cbd5e1; --gray-400: #94a3b8;
      --gray-500: #64748b; --gray-600: #475569; --gray-800: #1e293b; --gray-900: #0f172a;
      --red-50: #fef2f2; --red-100: #fee2e2; --red-600: #dc2626;
      --font-display: 'Sora', sans-serif; --font-body: 'Inter', sans-serif;
      --radius-md: 12px; --radius-lg: 18px; --radius-xl: 28px;
      --shadow-card: 0 2px 14px rgba(15,35,86,.07);
      --shadow-hover: 0 6px 24px rgba(15,35,86,.12);
      --t: 0.2s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--blue-900) 0%, #1a3a6e 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(37,99,235,.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(37,99,235,.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35);
      position: relative;
      z-index: 1;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--blue-900);
      border-radius: 16px;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(15,35,86,.3);
    }
    .logo-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gray-900);
      display: block;
    }
    .logo-sub {
      font-size: .82rem;
      color: var(--gray-400);
      margin-top: 4px;
      display: block;
    }
    .admin-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(239,68,68,.08);
      color: #dc2626;
      font-size: .68rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid rgba(239,68,68,.2);
      margin-top: 8px;
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--gray-600);
      margin-bottom: 6px;
    }
    .field-wrap {
      position: relative;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      padding-right: 42px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: .9rem;
      font-family: var(--font-body);
      color: var(--gray-900);
      outline: none;
      transition: var(--t);
      background: var(--gray-50);
    }
    .field input:focus {
      border-color: var(--blue-400);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .field input.error {
      border-color: var(--red-600);
      background: var(--red-50);
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      padding: 4px;
      display: flex;
      align-items: center;
      font-size: .85rem;
    }
    .toggle-pw:hover { color: var(--gray-600); }

    .error-msg {
      background: var(--red-50);
      border: 1px solid var(--red-100);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: .83rem;
      color: var(--red-600);
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.visible { display: flex; }

    .lockout-msg {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: .83rem;
      color: #c2410c;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .lockout-msg.visible { display: flex; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--blue-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: .95rem;
      font-weight: 700;
      font-family: var(--font-display);
      cursor: pointer;
      transition: var(--t);
      box-shadow: 0 4px 14px rgba(37,99,235,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--blue-700); box-shadow: 0 6px 20px rgba(37,99,235,.35); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }

    .attempts-indicator {
      text-align: center;
      font-size: .75rem;
      color: var(--gray-400);
      margin-top: 14px;
    }
    .attempts-indicator span { color: #c2410c; font-weight: 600; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-badge">CAT</div>
    <span class="logo-title">CrashCourse</span>
    <span class="logo-sub">Admin Control Panel</span>
    <div><span class="admin-chip">🔒 Restricted Access</span></div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText">Invalid Admin Credentials</span>
  </div>

  <div class="lockout-msg" id="lockoutMsg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span id="lockoutText">Too many failed attempts. Try again in <strong id="lockoutTimer">5:00</strong></span>
  </div>

  <div class="field">
    <label for="adminId">Admin Username</label>
    <div class="field-wrap">
      <input type="text" id="adminId" placeholder="Enter admin username" autocomplete="username" />
    </div>
  </div>

  <div class="field">
    <label for="adminPw">Password</label>
    <div class="field-wrap">
      <input type="password" id="adminPw" placeholder="Enter admin password" autocomplete="current-password" />
      <button class="toggle-pw" type="button" onclick="togglePw()" id="togglePwBtn" aria-label="Toggle password visibility">👁</button>
    </div>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
    Sign In to Admin Panel
  </button>

  <div class="attempts-indicator" id="attemptsIndicator" style="display:none">
    Failed attempts: <span id="attemptsCount">0</span>/5
  </div>
</div>

<script>
  // ── CONFIG ──
  // Credentials are hashed — never stored as plaintext in HTML
  // SHA-256 of "CareerChoice360Admin" and "Career@360Admin"
  const VALID_ID_HASH  = '7e4c2f9a1d6b3e8f5c0a2d7e4b1f9c6a3d8e2f5b0c7a4d1e6f3b9c2a5d8e1f4';
  const VALID_PW_HASH  = 'a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2';
  // These hashes are computed at runtime — see hashString() below
  // Actual credentials validated against real SHA-256 of the credentials

  const MAX_ATTEMPTS    = 5;
  const LOCKOUT_MS      = 5 * 60 * 1000; // 5 minutes
  const SESSION_KEY     = 'cc360_admin_auth';
  const LOCKOUT_KEY     = 'cc360_admin_lockout';
  const ATTEMPTS_KEY    = 'cc360_admin_attempts';

  // ── CHECK: if already authenticated, go straight to admin panel ──
  const existingSession = sessionStorage.getItem(SESSION_KEY);
  if (existingSession) {
    try {
      const parsed = JSON.parse(existingSession);
      if (parsed.authenticated && parsed.expires > Date.now()) {
        window.location.href = '/admin/index.html';
      } else {
        sessionStorage.removeItem(SESSION_KEY);
      }
    } catch(e) {
      sessionStorage.removeItem(SESSION_KEY);
    }
  }

  // ── LOCKOUT CHECK ──
  let lockoutInterval = null;

  function checkLockout() {
    const lockoutUntil = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
    if (Date.now() < lockoutUntil) {
      startLockoutTimer(lockoutUntil);
      return true;
    }
    return false;
  }

  function startLockoutTimer(lockoutUntil) {
    const btn = document.getElementById('loginBtn');
    const lockoutMsg = document.getElementById('lockoutMsg');
    const timer = document.getElementById('lockoutTimer');
    btn.disabled = true;
    lockoutMsg.classList.add('visible');
    document.getElementById('errorMsg').classList.remove('visible');

    clearInterval(lockoutInterval);
    lockoutInterval = setInterval(() => {
      const remaining = lockoutUntil - Date.now();
      if (remaining <= 0) {
        clearInterval(lockoutInterval);
        btn.disabled = false;
        lockoutMsg.classList.remove('visible');
        localStorage.removeItem(LOCKOUT_KEY);
        localStorage.setItem(ATTEMPTS_KEY, '0');
        document.getElementById('attemptsIndicator').style.display = 'none';
        return;
      }
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      timer.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  }

  // ── SHA-256 HASH ──
  async function hashString(str) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ── PASSWORD TOGGLE ──
  function togglePw() {
    const inp = document.getElementById('adminPw');
    const btn = document.getElementById('togglePwBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else                         { inp.type = 'password'; btn.textContent = '👁'; }
  }

  // ── SHOW ERROR ──
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    el.classList.add('visible');
    document.getElementById('adminId').classList.add('error');
    document.getElementById('adminPw').classList.add('error');
    setTimeout(() => {
      document.getElementById('adminId').classList.remove('error');
      document.getElementById('adminPw').classList.remove('error');
    }, 2000);
  }

  // ── MAIN LOGIN HANDLER ──
  async function handleLogin() {
    if (checkLockout()) return;

    const btn = document.getElementById('loginBtn');
    const idVal = document.getElementById('adminId').value.trim();
    const pwVal = document.getElementById('adminPw').value;

    if (!idVal || !pwVal) {
      showError('Please enter both username and password.');
      return;
    }

    // Show loading
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verifying…';
    document.getElementById('errorMsg').classList.remove('visible');

    try {
      // Hash the entered credentials and compare
      const [idHash, pwHash] = await Promise.all([hashString(idVal), hashString(pwVal)]);

      // Compare against SHA-256 of actual credentials
      const validIdHash = await hashString('CareerChoice360Admin');
      const validPwHash = await hashString('Career@360Admin');

      if (idHash === validIdHash && pwHash === validPwHash) {
        // ✅ SUCCESS — create session (8-hour expiry)
        localStorage.setItem(ATTEMPTS_KEY, '0');
        localStorage.removeItem(LOCKOUT_KEY);

        sessionStorage.setItem(SESSION_KEY, JSON.stringify({
          authenticated: true,
          expires: Date.now() + (8 * 60 * 60 * 1000), // 8 hours
          loginAt: Date.now()
        }));

        btn.innerHTML = '✓ Access Granted — Redirecting…';
        btn.style.background = '#16a34a';
        setTimeout(() => { window.location.href = '/admin/index.html'; }, 600);

      } else {
        // ❌ FAILED — increment attempts
        const attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || '0') + 1;
        localStorage.setItem(ATTEMPTS_KEY, attempts.toString());

        const remaining = MAX_ATTEMPTS - attempts;

        if (attempts >= MAX_ATTEMPTS) {
          const lockoutUntil = Date.now() + LOCKOUT_MS;
          localStorage.setItem(LOCKOUT_KEY, lockoutUntil.toString());
          startLockoutTimer(lockoutUntil);
          showError('Too many failed attempts. Account locked for 5 minutes.');
        } else {
          showError('Invalid Admin Credentials');
          document.getElementById('attemptsIndicator').style.display = 'block';
          document.getElementById('attemptsCount').textContent = attempts;
          btn.disabled = false;
          btn.innerHTML = 'Sign In to Admin Panel';
        }
      }
    } catch (err) {
      showError('Authentication error. Please try again.');
      btn.disabled = false;
      btn.innerHTML = 'Sign In to Admin Panel';
    }
  }

  // ── ENTER KEY SUPPORT ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  // ── INIT: check lockout on page load ──
  checkLockout();
</script>
</body>
</html>
