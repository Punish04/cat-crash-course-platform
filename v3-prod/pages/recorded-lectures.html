<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recorded Lectures — CAT CrashCourse 2026</title>
  <meta name="description" content="Access all recorded CAT 2026 lectures — QA, VARC, and DILR. Watch at your own pace on CAT CrashCourse." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://careerchoice360.in/pages/recorded-lectures.html" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" as="script" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --blue-900:#0f2356;--blue-800:#1a3a6e;--blue-700:#1e4d9b;
      --blue-600:#2563eb;--blue-500:#3b82f6;--blue-400:#60a5fa;
      --blue-100:#dbeafe;--blue-50:#eff6ff;
      --white:#fff;--gray-50:#f8fafc;--gray-100:#f1f5f9;
      --gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;
      --gray-500:#64748b;--gray-600:#475569;--gray-800:#1e293b;--gray-900:#0f172a;
      --sidebar-w:252px;
      --font-display:'Sora',sans-serif;--font-body:'Inter',sans-serif;
      --radius-md:12px;--radius-lg:18px;--radius-xl:28px;
      --shadow-card:0 2px 16px rgba(15,35,86,.07);
      --shadow-hover:0 6px 28px rgba(15,35,86,.12);
      --t:0.2s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--gray-50);color:var(--gray-900);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.2}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;border:none;background:none;font-family:var(--font-body)}

    .app{display:flex;min-height:100vh}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--gray-100);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform var(--t)}
    .sidebar-logo{padding:22px 20px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:12px}
    .logo-mark{background:var(--blue-600);color:#fff;font-family:var(--font-display);font-weight:800;font-size:.78rem;padding:6px 9px;border-radius:9px;letter-spacing:.04em;flex-shrink:0}
    .logo-title{font-family:var(--font-display);font-weight:700;font-size:.9rem;color:var(--gray-900);display:block;line-height:1.1}
    .logo-sub{font-size:.66rem;color:var(--gray-400);display:block}
    .sidebar-nav{flex:1;padding:12px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
    .nav-section-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);padding:14px 10px 6px}
    .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:.875rem;font-weight:500;color:var(--gray-600);transition:var(--t);cursor:pointer}
    .nav-item:hover{background:var(--gray-50);color:var(--gray-900)}
    .nav-item.active{background:var(--blue-50);color:var(--blue-700);font-weight:600}
    .nav-item.active .nav-icon{color:var(--blue-600)}
    .nav-icon{width:18px;height:18px;flex-shrink:0;color:var(--gray-400);transition:var(--t)}
    .nav-item:hover .nav-icon{color:var(--gray-700)}
    .nav-badge{margin-left:auto;background:var(--blue-600);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:99px}
    .sidebar-footer{padding:14px 16px;border-top:1px solid var(--gray-100)}
    .sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:var(--t)}
    .sidebar-user:hover{background:var(--gray-50)}
    .user-avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--blue-100),#bfdbfe);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:.82rem;color:var(--blue-700);flex-shrink:0}
    .user-name{font-size:.83rem;font-weight:600;color:var(--gray-800)}
    .user-role{font-size:.72rem;color:var(--gray-400)}
    .logout-icon{margin-left:auto;color:var(--gray-300);transition:var(--t)}
    .sidebar-user:hover .logout-icon{color:#ef4444}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,35,86,.4);backdrop-filter:blur(4px);z-index:49}
    .sidebar-overlay.open{display:block}

    /* MAIN */
    .main-area{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
    .dash-header{background:var(--white);border-bottom:1px solid var(--gray-100);padding:0 28px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:40;box-shadow:0 1px 0 var(--gray-100)}
    .header-menu-btn{display:none;padding:6px;border-radius:8px;color:var(--gray-600);transition:var(--t)}
    .header-menu-btn:hover{background:var(--gray-100)}
    .header-title{font-family:var(--font-display);font-size:1.05rem;font-weight:700;color:var(--gray-900)}
    .header-search{flex:1;max-width:340px;margin:0 auto;position:relative}
    .header-search input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:.85rem;font-family:var(--font-body);color:var(--gray-700);background:var(--gray-50);outline:none;transition:var(--t)}
    .header-search input:focus{border-color:var(--blue-400);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .header-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none}
    .header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .header-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gray-500);transition:var(--t);position:relative}
    .header-btn:hover{background:var(--gray-100);color:var(--gray-800)}
    .notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff}
    .header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue-100),#bfdbfe);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:.8rem;color:var(--blue-700);cursor:pointer;border:2px solid var(--blue-100);transition:var(--t)}
    .header-avatar:hover{border-color:var(--blue-400)}

    /* CONTENT */
    .dash-content{padding:28px;flex:1}

    /* PAGE BANNER */
    .page-banner{background:linear-gradient(135deg,var(--blue-700),var(--blue-900));border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
    .page-banner::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.07),transparent 70%)}
    .page-banner-text h2{font-size:1.35rem;font-weight:800;color:#fff;margin-bottom:4px}
    .page-banner-text p{font-size:.88rem;color:rgba(255,255,255,.65);line-height:1.5}
    .page-banner-stat{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 24px;text-align:center;backdrop-filter:blur(8px)}
    .page-banner-stat-val{font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:#fff}
    .page-banner-stat-label{font-size:.75rem;color:rgba(255,255,255,.65);margin-top:2px}

    /* FILTERS */
    .filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
    .filter-btn{padding:8px 16px;border-radius:99px;font-size:.82rem;font-weight:600;border:1.5px solid var(--gray-200);color:var(--gray-600);background:var(--white);transition:var(--t);cursor:pointer}
    .filter-btn:hover{border-color:var(--blue-400);color:var(--blue-700)}
    .filter-btn.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}
    .filter-count{font-size:.72rem;font-weight:700;background:rgba(255,255,255,.25);padding:1px 6px;border-radius:99px;margin-left:4px}
    .filter-count-dark{font-size:.72rem;font-weight:700;background:var(--gray-100);color:var(--gray-500);padding:1px 6px;border-radius:99px;margin-left:4px}

    /* SECTION CARD */
    .section-card{background:var(--white);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-card);border:1px solid var(--gray-100)}
    .section-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .section-card-title{font-size:.95rem;font-weight:700;color:var(--gray-900)}
    .section-card-link{font-size:.78rem;font-weight:600;color:var(--blue-600);transition:var(--t)}
    .section-card-link:hover{color:var(--blue-800)}

    /* LECTURE GRID */
    .lecture-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-bottom:28px}
    .lec-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-100);box-shadow:var(--shadow-card);overflow:hidden;transition:var(--t)}
    .lec-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
    .lec-thumb{width:100%;height:158px;background:linear-gradient(135deg,var(--blue-50),var(--blue-100));display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;overflow:hidden}
    .lec-thumb img{width:100%;height:100%;object-fit:cover}
    .lec-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,35,86,.25);opacity:0;transition:var(--t)}
    .lec-card:hover .lec-play-overlay{opacity:1}
    .lec-play-btn{width:44px;height:44px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--blue-700)}
    .lec-duration-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:6px}
    .lec-body{padding:14px 16px 16px}
    .lec-tags{display:flex;gap:6px;margin-bottom:8px}
    .lec-tag{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
    .tag-qa{background:var(--blue-50);color:var(--blue-700)}
    .tag-varc{background:#f5f3ff;color:#6d28d9}
    .tag-dilr{background:#f0fdf4;color:#16a34a}
    .lec-title{font-size:.9rem;font-weight:700;color:var(--gray-900);margin-bottom:4px;line-height:1.35}
    .lec-meta{font-size:.76rem;color:var(--gray-400);display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .lec-footer{display:flex;align-items:center;justify-content:space-between}
    .watch-btn{font-size:.8rem;font-weight:600;color:var(--blue-600);padding:7px 14px;border-radius:8px;background:var(--blue-50);transition:var(--t)}
    .watch-btn:hover{background:var(--blue-100)}
    .lec-completed-badge{font-size:.72rem;font-weight:600;color:#16a34a;background:#f0fdf4;padding:4px 10px;border-radius:99px;display:flex;align-items:center;gap:4px}

    /* SKELETON */
    .skeleton{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

    /* TOAST */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-md);background:#fff;box-shadow:var(--shadow-hover);border-left:4px solid var(--blue-600);font-size:.85rem;font-weight:500;min-width:240px;animation:toastIn .3s ease}
    .toast.success{border-color:#16a34a}
    .toast.error{border-color:#ef4444}
    @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

    /* RESPONSIVE */
    @media(max-width:1200px){.lecture-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:900px){.lecture-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .main-area{margin-left:0}
      .header-menu-btn{display:flex}
      .header-search{display:none}
      .dash-content{padding:16px}
      .page-banner{flex-direction:column;align-items:flex-start;gap:14px}
      .lecture-grid{grid-template-columns:1fr}
    }

    /* ── ACCESSIBILITY ── */
    :focus-visible{outline:2px solid var(--blue-500);outline-offset:3px;border-radius:4px}

    /* ── TOUCH TARGETS ── */
    @media(max-width:768px){
      .btn,.nav-item,.sidebar-logout{min-height:44px}
      button{min-height:44px}
    }

    /* ── PREFERS REDUCED MOTION ── */
    @media(prefers-reduced-motion:reduce){
      *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
</head>

  const SUPABASE_URL      = 'https://scswtmwcogqtcdlxdgof.supabase.co';

    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.style.borderColor = type==='success'?'#16a34a':type==='error'?'#ef4444':'#3b82f6';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300)},3500);
  }

  // Minimal HTML escaping for any text pulled from the database before
  // it's injected via innerHTML — protects against a compromised/malicious
  // admin entry rendering as live HTML in every student's browser.
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebarOverlay');
  const menuBtn  = document.getElementById('menuBtn');
  menuBtn.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('open'); });
  overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });

  document.getElementById('sidebarLogout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = '/pages/login.html';
  });

  let currentUserId   = null;
  let completedIds    = new Set();
  let loadedLectures  = [];   // lectures currently loaded into the grid (paginated)
  let activeFilter    = 'all';
  let activeSearch    = '';
  let pageOffset      = 0;
  let hasMore         = true;
  let isLoadingPage   = false;

  const tagMap = { QA: 'tag-qa', VARC: 'tag-varc', DILR: 'tag-dilr' };

  function lecCardHTML(l) {
    const isDone = completedIds.has(l.id);
    return `
      <div class="lec-card">
        <div class="lec-thumb">
          ${l.thumbnail_url ? `<img src="${esc(l.thumbnail_url)}" alt="${esc(l.title)}" loading="lazy" decoding="async"/>` : '🎥'}
          <div class="lec-play-overlay">
            <div class="lec-play-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
          </div>
          ${l.duration ? `<div class="lec-duration-badge">${esc(l.duration)}</div>` : ''}
        </div>
        <div class="lec-body">
          <div class="lec-tags">
            ${l.category ? `<span class="lec-tag ${tagMap[l.category]||'tag-qa'}">${esc(l.category)}</span>` : ''}
          </div>
          <div class="lec-title">${esc(l.title)}</div>
          <div class="lec-meta">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${esc(l.faculty || 'Faculty')} ${l.date ? `· ${new Date(l.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}` : ''}
          </div>
          <div class="lec-footer">
            <a href="/pages/lecture.html?slug=${encodeURIComponent(l.slug)}" class="watch-btn">Watch Now →</a>
            ${isDone ? `<span class="lec-completed-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Done</span>` : ''}
          </div>
        </div>
      </div>`;
  }

  function skeletonHTML(count) {
    return Array.from({length:count}).map(()=>`
      <div class="lec-card">
        <div class="skeleton" style="height:158px;border-radius:0"></div>
        <div style="padding:14px 16px">
          <div class="skeleton" style="height:14px;margin-bottom:8px;width:60%"></div>
          <div class="skeleton" style="height:18px;margin-bottom:6px"></div>
          <div class="skeleton" style="height:13px;width:70%"></div>
        </div>
      </div>`).join('');
  }

  function renderGrid({ append = false } = {}) {
    const grid = document.getElementById('lectureGrid');
    const visible = activeSearch
      ? loadedLectures.filter(l => l.title.toLowerCase().includes(activeSearch))
      : loadedLectures;

    if (!visible.length) {
      grid.innerHTML = `<p style="font-size:.88rem;color:var(--gray-400);grid-column:1/-1;text-align:center;padding:40px 0">No lectures found. Check back soon!</p>`;
      removeLoadMore();
      return;
    }

    const html = visible.map(lecCardHTML).join('');
    if (append) grid.insertAdjacentHTML('beforeend', html);
    else grid.innerHTML = html;

    renderLoadMore();
  }

  function removeLoadMore() {
    document.getElementById('loadMoreBtn')?.remove();
  }

  function renderLoadMore() {
    removeLoadMore();
    // Don't show "load more" while actively searching (search only applies
    // to already-loaded lectures, to avoid confusing partial-catalog search)
    if (!hasMore || activeSearch) return;
    const grid = document.getElementById('lectureGrid');
    const btnWrap = document.createElement('div');
    btnWrap.id = 'loadMoreBtn';
    btnWrap.style.cssText = 'grid-column:1/-1;display:flex;justify-content:center;padding:8px 0 16px';
    btnWrap.innerHTML = `<button class="filter-btn" style="padding:10px 28px" id="loadMoreInner">Load more lectures</button>`;
    grid.appendChild(btnWrap);
    document.getElementById('loadMoreInner').addEventListener('click', () => loadPage({ append: true }));
  }

  // Fetches one page of lectures (filtered by category if active), merges in
  // completion state, and renders. Designed to be resilient: a failed
  // request shows a retry option instead of leaving the page blank/broken.
  async function loadPage({ append = false } = {}) {
    if (isLoadingPage) return;
    isLoadingPage = true;

    if (!append) {
      pageOffset = 0;
      hasMore = true;
      document.getElementById('lectureGrid').innerHTML = skeletonHTML(8);
    } else {
      const btn = document.getElementById('loadMoreInner');
      if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    }

    try {
      let query = supabase
        .from('lectures')
        .select('*')
        .eq('type', 'recorded')
        .order('created_at', { ascending: false })
        .range(pageOffset, pageOffset + PAGE_SIZE - 1);

      if (activeFilter !== 'all') query = query.eq('category', activeFilter);

      const { data, error } = await query;
      if (error) throw error;

      const page = data || [];
      loadedLectures = append ? [...loadedLectures, ...page] : page;
      pageOffset += page.length;
      hasMore = page.length === PAGE_SIZE;

      renderGrid({ append });
    } catch (err) {
      console.error(err);
      const grid = document.getElementById('lectureGrid');
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:48px 0">
          <p style="font-size:.9rem;color:var(--gray-500);margin-bottom:14px">Couldn't load lectures. Check your connection and try again.</p>
          <button class="filter-btn active" id="retryBtn">Retry</button>
        </div>`;
      document.getElementById('retryBtn')?.addEventListener('click', () => loadPage({ append: false }));
      toast('Failed to load lectures.', 'error');
    } finally {
      isLoadingPage = false;
    }
  }

  // Category counts use a lightweight head-only count query instead of
  // pulling every row into memory — stays fast no matter how large the
  // catalog grows.
  async function loadCounts() {
    try {
      const [all, qa, varc, dilr] = await Promise.all([
        supabase.from('lectures').select('id', { count: 'exact', head: true }).eq('type','recorded'),
        supabase.from('lectures').select('id', { count: 'exact', head: true }).eq('type','recorded').eq('category','QA'),
        supabase.from('lectures').select('id', { count: 'exact', head: true }).eq('type','recorded').eq('category','VARC'),
        supabase.from('lectures').select('id', { count: 'exact', head: true }).eq('type','recorded').eq('category','DILR'),
      ]);
      document.getElementById('totalCount').textContent = all.count ?? 0;
      document.getElementById('countAll').textContent   = all.count ?? 0;
      document.getElementById('countQA').textContent    = qa.count ?? 0;
      document.getElementById('countVARC').textContent  = varc.count ?? 0;
      document.getElementById('countDILR').textContent  = dilr.count ?? 0;
    } catch (err) {
      console.error(err);
      // Non-critical — counts failing shouldn't block the lecture grid itself
    }
  }

  function applyFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
    loadPage({ append: false });
  }

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  // Debounced search — avoids re-rendering the grid on every single
  // keystroke, keeping typing smooth even on lower-end devices.
  let searchDebounce;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(() => {
      activeSearch = val.trim().toLowerCase();
      renderGrid({ append: false });
    }, 250);
  });

  (async function init() {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '/pages/login.html'; return; }

      currentUserId = session.user.id;
      const { data: profile, error: profileErr } = await supabase
        .from('users').select('*').eq('id', currentUserId).single();
      if (profileErr) throw profileErr;
      if (!profile?.course_access) { window.location.href = '/pages/access-pending.html'; return; }

      const firstName = (profile.full_name || session.user.email).split(' ')[0];
      const initials  = (profile.full_name || '?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      document.getElementById('sidebarName').textContent   = esc(profile.full_name || session.user.email);
      document.getElementById('sidebarAvatar').textContent = initials;
      document.getElementById('headerAvatar').textContent  = initials;

      // Load this student's completion state once, up front, so every
      // page of lectures (including ones loaded later via "Load more")
      // can show the correct "Done" badge without an extra round-trip.
      const { data: progress, error: progressErr } = await supabase
        .from('lecture_progress')
        .select('lecture_id, completed')
        .eq('user_id', currentUserId);
      if (progressErr) throw progressErr;
      completedIds = new Set((progress || []).filter(p => p.completed).map(p => p.lecture_id));

      // Counts and first page load in parallel — independent of each other,
      // so a slow/failed count query never blocks lectures from appearing.
      await Promise.all([loadCounts(), loadPage({ append: false })]);

    } catch (err) {
      console.error(err);
      toast('Something went wrong loading this page.', 'error');
    }
  })();
</script>
</body>
</html>
